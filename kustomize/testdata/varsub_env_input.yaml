apiVersion: v1
kind: ConfigMap
metadata:
  name: ${APP_NAME}
  namespace: ${APP_NAMESPACE:=default}
data:
  region: ${APP_REGION:=eu-west-1}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard
  namespace: monitoring
  annotations:
    kustomize.toolkit.fluxcd.io/substitute: disabled
data:
  dashboard.json: '{"panels": [{"datasource": "${DataSource}"}]}'
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: init-scripts
  namespace: default
  labels:
    kustomize.toolkit.fluxcd.io/substitute: disabled
data:
  setup.sh: |
    #!/bin/bash
    process_args() {
      echo "First arg: $1"
      echo "Second arg: $2"
      local name=${1:-default}
      local count=${2:-0}
      for i in $(seq 1 $count); do
        echo "$i: processing $name"
      done
    }
    process_args "$@"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ${APP_NAME}-config
  namespace: ${APP_NAMESPACE:=default}
data:
  key: value
