apiVersion: v1
kind: ConfigMap
metadata:
  name: myapp
  namespace: default
data:
  region: eu-west-1
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard
  namespace: monitoring
  annotations:
    kustomize.toolkit.fluxcd.io/substitute: disabled
data:
  dashboard.json: '{"panels": [{"datasource": "${DataSource}"}]}'
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: init-scripts
  namespace: default
  labels:
    kustomize.toolkit.fluxcd.io/substitute: disabled
data:
  setup.sh: |
    #!/bin/bash
    process_args() {
      echo "First arg: $1"
      echo "Second arg: $2"
      local name=${1:-default}
      local count=${2:-0}
      for i in $(seq 1 $count); do
        echo "$i: processing $name"
      done
    }
    process_args "$@"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: myapp-config
  namespace: default
data:
  key: value
