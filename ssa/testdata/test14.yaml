---
apiVersion: v1
kind: Namespace
metadata:
  name: "%[1]s"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: "%[1]s"
  namespace: "%[1]s"
rules:
  - apiGroups:
      - ""
    resources: ["configmaps"]
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: "%[1]s"
  namespace: "%[1]s"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: "%[1]s"
subjects:
  - kind: ServiceAccount
    name: "%[1]s"
    namespace: "%[1]s"
